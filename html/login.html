<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../img/logo.png" type="image/png" />
    <title>Doe Mais - Login</title>
  </head>
  <body class="flex h-screen">
    <main class="flex justify-center items-center w-full h-full">
      <section class="flex flex-col h-10/12 w-1/2">
        <!-- Direcionar para a page de register -->
        <div class="flex flex-col h-[10%] w-full text-gray-1 font-inter">
          <h1 class="text-4xl font-extralight">Acesse sua conta</h1>
          <div class="flex flex-row text-sm gap-2">
            <p class="font-extralight">Não possuí conta?</p>
            <a class="font-normal underline hover:text-red-1" href="./register.html"
              >Clique aqui</a
            >
          </div>
        </div>
        <!-- Formulário para o login -->
        <form
          class="flex flex-col justify-center h-full w-11/12 gap-4"
          action="#"
        >
          <!-- Inputs -->
          <div class="flex flex-col h-3/4 justify-center gap-6">
            <!-- Input Email ou CPF -->
            <!-- <div
            class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
          >
            <img class="size-4" src="../img/cpf.png" alt="cadeado" />
            <input
              class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
              required
              placeholder=" "
              type="cpf"
              name="cpf"
              id="cpf"
            />
            <label
              for="cpf"
              class="absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1 peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
            >
              CPF
            </label>
          </div> -->

            <div
              class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
            >
              <img class="size-4" src="../img/email.png" alt="envelope" />
              <input
                class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
                required
                placeholder=" "
                type="email"
                name="email"
                id="email"
              />
              <label
                for="email"
                class="absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1 peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
              >
                E-mail
              </label>
            </div>
            <!-- Input Senha -->
            <div
              class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
            >
              <img class="size-4" src="../img/senha.png" alt="cadeado" />
              <input
                class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
                required
                placeholder=" "
                type="password"
                name="senha"
                id="senha"
              />
              <label
                for="senha"
                class="absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1 peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
              >
                Senha
              </label>
            </div>
          </div>
          <!-- Botão para entrar -->
          <div class="flex justify-center items-center w-4/5">
            <div class="bg-red-1 flex justify-center w-28 h-8 rounded-2xl hover:scale-105 duration-500 cursor-pointer">
              <input
                class="text-white font-inter font-semibold cursor-pointer"
                type="submit"
                value="Entrar"
              />
            </div>
          </div>
        </form>
      </section>
    </main>
    <!-- Lateral -->
    <div
      class="h-screen w-[40%] bg-red-1 rounded-bl-[10%] rounded-tl-[10%] flex flex-col justify-evenly items-center font-inter text-white"
    >
      <h2 class="text-3xl font-bold text-center">Continue fazendo <br> a diferença!</h2>
      <img
        class="w-44 h-44"
        src="../img/longin_banco_sangue.png"
        alt="documento de identificação de doador de sangue"
      />
      <p class="text-xl font-bold">Espalhe vida com um gesto</p>
    </div>
