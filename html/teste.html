<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap"
      rel="stylesheet"
    />
    <link rel="icon"/title>
  </head>
  <body class="flex h-screen">
    <!-- Lateral -->
    <div
      class="h-screen w-[30%] bg-red-1 rounded-br-[10%] rounded-tr-[10%] flex flex-col justify-evenly items-center font-inter text-white"
    >
      <h2 class="text-3xl font-bold">Seja um doador!</h2>
      <img
        class="w-44 h-44"
        src="../img/cadastro_banco_sangue.png"
        alt="foto de um banco de sangue"
      />
      <p class="text-xl font-bold">Espalhe vida com um gesto</p>
    </div>
    <main class="flex justify-center items-center w-full h-full bg-cyan-600">
      <section class="flex flex-col h-11/12 w-1/2">
        <!-- Direcionar para a page de login -->
        <div class="flex flex-col h-[10%] w-full text-gray-1 font-inter bg-pink-200">
          <h1 class="text-4xl font-extralight">Crie sua conta</h1>
          <div class="flex flex-row text-sm gap-2">
            <p class="font-extralight">Já possuí conta?</p>
            <a class="font-normal underline" href="./developing.html"
              >Clique aqui</a
            >
          </div>
        </div>
        <!-- Formulário para o cadastro -->
        <form class="flex flex-col justify-evenly h-full w-4/5 gap-2 bg-amber-100" action="#">
 
  <!-- Input Nome -->
  <div class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1">
    <input
      class="peer outline-none w-full bg-transparent pl-6 text-gray-1 text-base transition-all duration-200"
      required placeholder=" " type="text" name="nome" id="nome"
    />
    <label for="nome"
      class="absolute left-6 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200
             peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base
             peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1
             peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
    >
      Nome
    </label>
  </div>

  <!-- Input Data de Nascimento -->
  <!-- (type=date não suporta placeholder, então mantém group-focus-within + peer-valid) -->
  <div class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 transition-all duration-200 focus-within:border-red-1">
    <img class="size-4" src="../img/data_nascimento.png" alt="bolo de aniversário" />
    <input
      class="[&::-webkit-calendar-picker-indicator]:opacity-40 peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
      required type="date" name="data_nascimento" id="data_nascimento"
    />
    <label for="data_nascimento"
      class="pointer-events-none absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200
             group-focus-within:top-0 group-focus-within:-translate-y-1/2 group-focus-within:text-xs group-focus-within:text-red-1
             peer-valid:top-0 peer-valid:-translate-y-1/2 peer-valid:text-xs"
    >
      Data de nascimento
    </label>
  </div>

  <!-- Tipo Sanguíneo e CPF -->
  <div class="flex flex-row gap-4">

    <!-- Input Tipo Sanguíneo -->
    <!-- (select não suporta placeholder, então precisa usar group-focus-within + peer-valid) -->
    <div class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1">
      <img class="size-4" src="../img/tipo_sanguineo.png" alt="gota" />
      <select
        class="peer outline-none w-full text-gray-1 text-base bg-transparent transition-all duration-200 appearance-none cursor-pointer"
        required name="tipo_sanguineo" id="tipo_sanguineo"
      >
        <option value="" disabled selected hidden></option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
      </select>
      <label for="tipo_sanguineo"
        class="pointer-events-none absolute left-14 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200
               group-focus-within:top-0 group-focus-within:-translate-y-1/2 group-focus-within:text-xs group-focus-within:text-red-1
               peer-valid:top-0 peer-valid:-translate-y-1/2 peer-valid:text-xs"
      >
        Tipo sanguíneo
      </label>
    </div>

    <!-- Input CPF -->
    <div class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 rounded-3xl gap-2 focus-within:border-red-1">
      <img class="size-4" src="../img/cpf.png" alt="documento de identidade" />
      <input
        class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
        required placeholder=" " type="text" name="cpf" id="cpf"
      />
      <label for="cpf"
        class="absolute left-14 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200
               peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base
               peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1
               peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
      >
        CPF
      </label>
    </div>

  </div>

  <!-- Input E-mail -->
  <div class="group relative
   flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1">
    <img class="size-4" src="../img/email.png" alt="envelope" />
    <input
      class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
      required placeholder=" " type="email" name="email" id="email"
    />
    <label for="email"
      class="absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200
             peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base
             peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1
             peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
    >
      E-mail
    </label>
  </div>

  <!-- Input Senha -->
  <div class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1">
    <img class="size-4" src="../img/senha.png" alt="cadeado" />
    <input
      class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
      required placeholder=" " type="password" name="senha" id="senha"
    />
    <label for="senha"
      class="absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200
             peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base
             peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1
             peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
    >
      Senha
    </label>
  </div>

</form>
      </section>
    </main>
  </body>
</html>
