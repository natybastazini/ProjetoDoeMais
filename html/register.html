<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../img/logo.png" type="image/png" />
    <title>Doe Mais</title>
  </head>
  <body class="flex h-screen">
    <!-- Lateral -->
    <div
      class="h-screen w-[30%] bg-red-1 rounded-br-[10%] rounded-tr-[10%] flex flex-col justify-evenly items-center font-inter text-white"
    >
      <h2 class="text-3xl font-bold">Seja um doador!</h2>
      <img
        class="w-44 h-44"
        src="../img/cadastro_banco_sangue.png"
        alt="foto de um banco de sangue"
      />
      <p class="text-xl font-bold">Espalhe vida com um gesto</p>
    </div>
    <main class="flex justify-center items-center w-full h-full">
      <section class="flex flex-col h-11/12 w-1/2">
        <!-- Direcionar para a page de login -->
        <div class="flex flex-col h-[10%] w-full text-gray-1 font-inter">
          <h1 class="text-4xl font-extralight">Crie sua conta</h1>
          <div class="flex flex-row text-sm gap-2">
            <p class="font-extralight">Já possuí conta?</p>
            <a class="font-normal underline" href="./developing.html">Clique aqui</a>
          </div>
        </div>
        <!-- Formulário para o cadastro -->
        <form class="flex flex-col justify-evenly h-full w-4/5 gap-4 bg-amber-100" action="#">
          <!-- Input nome -->
          <div
            class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-green-1 focus-within:bg-green-2"
          >
            <input
              class="peer outline-none w-full bg-transparent pl-6 text-gray-1 text-base transition-all duration-200 focus:text-green-1"
              required
              placeholder=" "
              type="text"
              name="nome"
              id="nome"
            />

            <label
              for="nome"
              class="absolute left-8 top-1/2 -translate-y-1/2 text-gray-1 transition-all duration-200 peer-focus:top-2 peer-focus:text-xs peer-focus:text-green-1 peer-valid:top-2 peer-valid:text-xs"
            >
              Nome
            </label>
          </div>
          <!-- Input data nascimento -->
          <div
            class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 transition-all duration-200 focus-within:border-green-1 focus-within:bg-green-2"
          >
            <img
              class="size-4 transition-all duration-200 group-focus-within:hidden"
              src="../img/data_nascimento.png"
              alt="bolo de aniversário"
            />

            <img
              class="size-4 hidden transition-all duration-200 group-focus-within:block"
              src="../img/data_nascimento_selecionada.png"
              alt="bolo de aniversário"
            />

            <input
              class="[&::-webkit-calendar-picker-indicator]:opacity-40 peer outline-none w-4/5 text-gray-1 text-base pt-5 transition-all duration-200 group-focus-within:text-green-1"
              required
              type="date"
              name="data_nascimento"
              id="data_nascimento"
            />

            <label
              for="data_nascimento"
              class="pointer-events-none absolute left-14 top-2 text-xs text-gray-1 transition-all duration-200 group-focus-within:text-green-1"
            >
              Data de nascimento
            </label>
          </div>
          <!-- Input CPF -->
          <div
            class="group relative flex flex-row justify-center items-center w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-green-1 focus-within:bg-green-2"
          >
            <img
              class="size-4 transition-all group-focus-within:hidden"
              src="../img/cpf.png"
              alt="documento de identidade"
            />

            <img
              class="size-4 hidden transition-all group-focus-within:block"
              src="../img/cpf_selecionado.png"
              alt="documento de identidade"
            />

            <input
              class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200 focus:text-green-1"
              required
              type="text"
              name="cpf"
              id="cpf"
            />

            <label
              for="cpf"
              class="absolute left-14 top-1/2 -translate-y-1/2 text-gray-1 transition-all duration-200 peer-focus:top-2 peer-focus:text-xs peer-focus:text-green-1 peer-valid:top-2 peer-valid:text-xs"
            >
              CPF
            </label>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
