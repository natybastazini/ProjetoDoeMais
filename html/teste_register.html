<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../img/logo.png" type="image/png" />
    <title>Doe Mais - Cadastro</title>
  </head>
  <body class="flex h-screen">
    <!-- Lateral (apenas desktop) -->
    <div
      class="hidden md:flex h-screen w-[40%] bg-red-1 rounded-br-[10%] rounded-tr-[10%] flex-col justify-evenly items-center font-inter text-white"
    >
      <h2 class="text-3xl font-bold">Seja um doador!</h2>
      <img
        class="w-44 h-44"
        src="../img/cadastro_banco_sangue.png"
        alt="banco de sangue"
      />
      <p class="text-xl font-bold">Espalhe vida com um gesto</p>
    </div>

    <main class="flex justify-center items-center w-full h-full">
      <section class="flex flex-col md:h-10/12 md:w-1/2 w-full px-6">
        <!-- Header -->
        <div class="flex flex-col h-auto mb-4 md:mb-0 md:h-[10%] w-full text-gray-1 font-inter">
          <h1 class="text-4xl font-extralight">Crie sua conta</h1>
          <div class="flex flex-row text-sm gap-2">
            <p class="font-extralight">Já possuí conta?</p>
            <a class="font-normal underline hover:text-red-1" href="./login.html">Clique aqui</a>
          </div>
        </div>

        <!-- MOBILE: dots de progresso -->
        <div class="flex md:hidden flex-row gap-2 my-4">
          <span id="dot-1" class="w-3 h-3 rounded-full bg-red-1"></span>
          <span id="dot-2" class="w-3 h-3 rounded-full bg-gray-300"></span>
        </div>

        <!-- Formulário -->
        <form
          class="flex flex-col justify-evenly h-full w-full md:w-11/12 gap-4 bg-white"
          action="#"
        >
          <!-- ETAPA 1 (mobile) / Todos os campos visíveis no desktop -->
          <div id="step-1" class="flex flex-col gap-4">
            <!-- Input nome -->
            <div
              class="group relative flex flex-row justify-center items-center w-full md:w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
            >
              <input
                class="peer outline-none w-full bg-transparent pl-6 text-gray-1 text-base transition-all duration-200"
                required
                placeholder=" "
                type="text"
                name="nome"
                id="nome"
              />
              <label
                for="nome"
                class="absolute left-6 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1 peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
              >
                Nome
              </label>
            </div>

            <!-- Input data nascimento -->
            <div
              class="group relative flex flex-row justify-center items-center w-full md:w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 transition-all duration-200 focus-within:border-red-1"
            >
              <img class="size-4" src="../img/data_nascimento.png" alt="bolo de aniversário" />
              <input
                class="[&::-webkit-calendar-picker-indicator]:opacity-40 peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
                required
                type="date"
                name="data_nascimento"
                id="data_nascimento"
              />
              <label
                for="data_nascimento"
                class="pointer-events-none absolute left-14 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 group-focus-within:top-0 group-focus-within:-translate-y-1/2 group-focus-within:text-xs group-focus-within:text-red-1 peer-valid:top-0 peer-valid:-translate-y-1/2 peer-valid:text-xs"
              >
                Data de nascimento
              </label>
            </div>

            <!-- TIPO SANGUÍNEO E CPF -->
            <!-- Desktop: lado a lado | Mobile: empilhados -->
            <div class="flex flex-col md:flex-row gap-4 w-full md:w-4/5">
              <!-- Input CPF -->
              <div
                class="group relative flex flex-row justify-center items-center w-full h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
              >
                <img class="size-4" src="../img/cpf.png" alt="documento de identidade" />
                <input
                  class="peer outline-none w-3/5 text-gray-1 text-base transition-all duration-200"
                  required
                  placeholder=" "
                  type="text"
                  name="cpf"
                  id="cpf"
                />
                <label
                  for="cpf"
                  class="absolute left-14 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1 peer-valid:top-0 peer-valid:-translate-y-1/2 peer-valid:text-xs"
                >
                  CPF
                </label>
              </div>

              <!-- Input tipo sanguíneo -->
              <div
                class="group relative flex flex-row justify-center items-center w-full h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
              >
                <img class="size-4" src="../img/tipo_sanguineo.png" alt="gota" />
                <select
                  class="peer outline-none w-2/3 text-gray-1 text-base bg-white transition-all duration-200 appearance-none cursor-pointer"
                  required
                  name="tipo_sanguineo"
                  id="tipo_sanguineo"
                >
                  <option value="" disabled selected hidden></option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                </select>
                <label
                  for="tipo_sanguineo"
                  class="pointer-events-none absolute left-12 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 group-focus-within:top-0 group-focus-within:-translate-y-1/2 group-focus-within:text-xs group-focus-within:text-red-1 peer-valid:top-0 peer-valid:-translate-y-1/2 peer-valid:text-xs"
                >
                  Tipo sanguíneo
                </label>
              </div>
            </div>

            <!-- Botão Avançar (apenas mobile, etapa 1) -->
            <div class="flex md:hidden justify-center items-center w-full mt-2">
              <button
                type="button"
                id="btn-avancar"
                class="bg-red-1 text-white font-inter font-semibold w-40 h-10 rounded-2xl transition-transform hover:scale-105 duration-500 cursor-pointer"
              >
                Avançar
              </button>
            </div>
          </div>

          <!-- ETAPA 2 (mobile) / Sempre visível no desktop -->
          <div id="step-2" class="flex flex-col gap-4 hidden md:flex">
            <!-- Input E-mail -->
            <div
              class="group relative flex flex-row justify-center items-center w-full md:w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
            >
              <img class="size-4" src="../img/email.png" alt="envelope" />
              <input
                class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
                required
                placeholder=" "
                type="email"
                name="email"
                id="email"
              />
              <label
                for="email"
                class="absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1 peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
              >
                E-mail
              </label>
            </div>

            <!-- Input Senha -->
            <div
              class="group relative flex flex-row justify-center items-center w-full md:w-4/5 h-12 bg-white border-2 border-gray-2 p-2 rounded-3xl gap-2 focus-within:border-red-1"
            >
              <img class="size-4" src="../img/senha.png" alt="cadeado" />
              <input
                class="peer outline-none w-4/5 text-gray-1 text-base transition-all duration-200"
                required
                placeholder=" "
                type="password"
                name="senha"
                id="senha"
              />
              <label
                for="senha"
                class="absolute left-16 top-1/2 -translate-y-1/2 text-base text-gray-1 bg-white px-1 transition-all duration-200 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-base peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-red-1 peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:-translate-y-1/2 peer-not-placeholder-shown:text-xs"
              >
                Senha
              </label>
            </div>

            <!-- Botão Cadastrar -->
            <div class="flex justify-center items-center w-full md:w-4/5">
              <div class="bg-red-1 flex justify-center w-40 h-10 rounded-2xl transition-transform hover:scale-105 duration-500 cursor-pointer">
                <input
                  class="text-white font-inter font-semibold cursor-pointer"
                  type="submit"
                  value="Cadastrar"
                />
              </div>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script>
      const isMobile = () => window.innerWidth < 768;

      const step1 = document.getElementById('step-1');
      const step2 = document.getElementById('step-2');
      const dot1 = document.getElementById('dot-1');
      const dot2 = document.getElementById('dot-2');
      const btnAvancar = document.getElementById('btn-avancar');

      function goToStep2() {
        step1.classList.add('hidden');
        step2.classList.remove('hidden');
        step2.classList.add('flex');
        dot1.classList.remove('bg-red-1');
        dot1.classList.add('bg-gray-300');
        dot2.classList.remove('bg-gray-300');
        dot2.classList.add('bg-red-1');
      }

      btnAvancar.addEventListener('click', () => {
        if (isMobile()) goToStep2();
      });
    </script>
  </body>
</html>
